name: Checkly

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Checkly checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'florafauna-ai/flora-typescript'
    env:
      CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: '10.30.1'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Checkly checks
        run: pnpm exec checkly test --record --reporter=github

      - name: Add Checkly summary
        if: always() && hashFiles('checkly-github-report.md') != ''
        run: cat checkly-github-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy Checkly checks
        run: pnpm exec checkly deploy --force
